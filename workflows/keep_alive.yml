name: Keep Apps Alive

# Pings all three deployed Streamlit apps every 2 days so they don't go to sleep.
# Streamlit Cloud free tier sleeps apps after ~7 days of inactivity.

on:
  schedule:
    - cron: "0 9 */2 * *"   # Every 2 days at 09:00 UTC
  workflow_dispatch:          # Also allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PortIQ
        run: curl -s -o /dev/null -w "%{http_code}" https://portiq.streamlit.app/

      - name: Ping DemandIQ
        run: curl -s -o /dev/null -w "%{http_code}" https://demandiq.streamlit.app/

      - name: Ping SpaceX Dashboard
        run: curl -s -o /dev/null -w "%{http_code}" https://spacex-launch-dashboard.streamlit.app/
